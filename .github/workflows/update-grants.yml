name: Update grant data

# Refresh the heme/onc K-award dataset from NIH RePORTER.
on:
  schedule:
    - cron: "0 11 * * 1"   # every Monday 11:00 UTC
  workflow_dispatch: {}      # manual "Run workflow" button

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch grants from NIH RePORTER
        run: python scripts/fetch_grants.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/grants.json data/grants_meta.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: refresh grant data [skip ci]"
            git push
          fi
